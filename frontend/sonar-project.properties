# SonarQube Configuration for Velocify Frontend

# Project identification
sonar.projectKey=velocify-frontend
sonar.organization=your-org
sonar.projectName=Velocify Frontend
sonar.projectVersion=1.0

# Source and test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusions
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.ts,**/*.config.js

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/*.config.ts,**/*.config.js,**/main.tsx,**/vite-env.d.ts

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Code quality settings
sonar.sourceEncoding=UTF-8
