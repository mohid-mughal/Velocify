# SonarQube Configuration for Velocify Backend

# Project identification
sonar.projectKey=velocify-backend
sonar.organization=your-org
sonar.projectName=Velocify Backend
sonar.projectVersion=1.0

# Source directories
sonar.sources=Velocify.API,Velocify.Application,Velocify.Domain,Velocify.Infrastructure
sonar.tests=Velocify.Tests

# Exclusions for migrations and auto-generated files
sonar.exclusions=\
  **/Migrations/**,\
  **/bin/**,\
  **/obj/**,\
  **/*.Designer.cs,\
  **/VelocifyDbContextModelSnapshot.cs,\
  **/AssemblyInfo.cs,\
  **/GlobalUsings.g.cs,\
  **/*.AssemblyAttributes.cs

# Test exclusions
sonar.test.exclusions=\
  **/*Tests.cs,\
  **/*Test.cs

# Coverage exclusions
sonar.coverage.exclusions=\
  **/Migrations/**,\
  **/Program.cs,\
  **/DependencyInjection.cs,\
  **/*.Designer.cs,\
  **/VelocifyDbContextModelSnapshot.cs,\
  **/Enums/**,\
  **/DTOs/**,\
  **/AssemblyReference.cs

# .NET specific settings
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/*.trx

# Code quality settings
sonar.sourceEncoding=UTF-8
sonar.language=cs

# Azure F1 tier considerations - exclude performance-heavy rules
# F1 tier has 60 mins CPU time per day, so we focus on critical issues
sonar.issue.ignore.multicriteria=e1,e2

# Ignore performance rules that may not apply to serverless/low-tier deployments
sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S1854
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.cs

# Ignore complexity rules for auto-generated migration files
sonar.issue.ignore.multicriteria.e2.ruleKey=csharpsquid:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/Migrations/**/*.cs
