name: Deploy Backend to Azure App Service

# This workflow deploys the ASP.NET Core backend to Azure App Service F1 tier
# 
# IMPORTANT: Azure F1 tier has 60 minutes CPU time per day limit
# - Monitor CPU usage in Azure Portal to avoid exceeding quota
# - Deployment itself consumes CPU time, so deploy during low-traffic periods
# - Consider upgrading to B1 tier (~$13/month) for unlimited CPU time

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: velocify
  AZURE_WEBAPP_PACKAGE_PATH: './backend'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Publish
        run: dotnet publish Velocify.API/Velocify.API.csproj --configuration Release --no-build --output ./publish
        working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/publish

      - name: Run EF Core Migrations
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project Velocify.Infrastructure/Velocify.Infrastructure.csproj --startup-project Velocify.API/Velocify.API.csproj --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"
        working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
